<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Www.RadioAndromeda.Tk</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Michroma">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Shantell Sans">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Allura">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto Condensed">

<style>
/* Estilos base */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #000000;
    color: #809990;
    font-family: "Roboto Condensed", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
}

/* Enlaces */
a:link  { color:#ffcc00; text-decoration: none; }
a { text-decoration:none; background-color:Transparent; color:#0055FF; }
a:visited { color:#ffcc00; text-decoration: none; }
a:hover { color:#ffffff; }

/* Contenedor principal flexible */
.main-container {
    display: flex;
    flex-direction: row;
    gap: 10px;
    flex: 2.1;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    align-items: flex-start;
}

/* Columna de la carátula (izquierda) */
.cover-column {
    flex:1.1;
    min-width: 0;
    max-width: 50Opx;
    margin-top: 2px;
}

/* Columna del player (derecha) */
.player-column {
    flex: 1.5;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 2px;
}

/* Carátula */
.cover-image {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0px 0px 20px rgba(12, 215, 195, 0.3);
    display: block;
    background: transparent;
}

/* Reproductor iframe */
.player-iframe {
    width: 100%;
    height: 75vh; /* altura completa en desktop */
    min-height: 400px;
    border: none;
    border-radius: 5px;
    background: transparent;
    display: block;
}

/* Información de "Sonando" y "Viene" */
.now-playing {
position: fixed;
    bottom: 10px;
    left: 65px;


    font-size: 1.1rem;
    color: #A4ACCC;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 10px;
    backdrop-filter: blur(8px);
    border-left: 3px solid #0CD7C3;
    width: 100%;
    word-break: break-word;

}
.now-playing span {
    font-weight: bold;
    color: #ffcc00;
}

/* Botón home (logo) */
.home-logo {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
}
.home-logo img {
    width: 82px;
    height: 82px;
    border-radius: 0%;
    box-shadow: 0 0 15px rgba(0, 85, 255, 0.5);
    transition: transform 0.2s;
}
.home-logo img:hover {
    transform: scale(1.05);
}

/* Reloj */
.reloj {
    position: fixed;
    bottom: 15px;
    right: 20px;
    width: 200px;
    height: 28px;
    padding: 4px 10px;
    font: bold 0.9em "Michroma", dotum, arial;
    text-align: center;
    color: #0CD7C3;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    backdrop-filter: blur(2px);
    box-shadow: 0 0 15px rgba(0, 85, 255, 0.5);
    transition: transform 0.2s;

    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* --- RESPONSIVE: MÓVILES --- */
@media (max-width: 768px) {
    body {
        padding: 15px;
    }
    .main-container {
        flex-direction: column;
        gap: 20px;
        margin-top: 10px;
    }
    .cover-column {
        flex: none;
        max-width: 100%;
        margin-top: 10px;
        order: 1; /* Carátula arriba */
        width: 100%;
    }
    .cover-image {
        max-width: 300px; /* Tamaño moderado en móvil */
        margin: 0 auto;
        display: block;
    }
    .player-column {
        flex: none;
        margin-top: 0;
        order: 2; /* Player abajo */
        width: 100%;
    }
    .player-iframe {
        height: 30vh; /* Altura ajustada para móvil */
        min-height: 300px;
    }
    .now-playing {
        font-size: 0.8rem;
        padding: 10px 14px;
    }
    .home-logo {
        top: 5px;
        left: 5px;
    }
    .home-logo img {
        width: 75px;
        height: 75px;
    }
    .reloj {
        top: 3px;
        right: 10px;
        width: 120px;
        font-size: 0.5em;
        height: 24px;
    }
}

/* Ajuste extra para pantallas muy pequeñas */
@media (max-width: 480px) {
    .cover-image {
        max-width: 200px;
    }
    .player-iframe {
        height: 50vh;
        min-height: 250px;
    }
    .now-playing {
        font-size: 0.7rem;
        padding: 8px 12px ;
    }
}
</style>
 
</head>
	
<body>

<!-- Logo Home (fijo) -->
<div class="home-logo">
    <a href="https://rllom.github.io/radioandromeda/lvplayer/vinilo+leyenda.html" target="_top">
        <img src="https://rllom.github.io/radioandromeda/lvplayer/homelogo.png" alt="Rockola" title="Rockola">
    </a>
</div>

<!-- Contenedor principal: carátula izquierda / player derecha -->
<div class="main-container">

    <!-- Columna de la carátula (izquierda) -->
    <div class="cover-column">
        <img id="rbcloud_cover732" 
             src="https://c11.radioboss.fm/w/artwork/71.png" 
             alt="Radio Andromeda" 
             class="cover-image" />
        <!-- Widget de RadioBOSS para actualizar carátula (opcional) -->
        <script src='https://c11.radioboss.fm/w/cover.js?u=71&wid=732'></script>
    </div>

    <!-- Columna del reproductor (derecha) -->
    <div class="player-column">
        <!-- Reproductor iframe -->
        <iframe id="foot" 
                class="player-iframe" 
                src="https://rllom.github.io/andromeda/htmlcompilerlplayer/webplayer.html" 
                scrolling="no" 
                allow="autoplay">
        </iframe>

        <!-- Información de "Sonando" y "Viene" -->
        <div class="now-playing">
            <b>
                <span style="color:#A4ACCC;">Sonando:</span> 
                <span id='rbcloud_nowplaying3919'></span>
                <br>
                <span style="color:#A4ACCC;">Viene:</span> 
                <span id='rbcloud_nexttrack3919'></span>
            </b>
        </div>
        <script src='https://c11.radioboss.fm/w/nowplaying.js?u=71&wid=3919&nl=1'></script>
    </div>

</div>

<!-- Reloj numerico (fijo) -->
<div id="relojnumerico" class="reloj"></div>

<script>
function cargarReloj(){
    var fechahora = new Date();
    var hora = fechahora.getHours(); 
    var minuto = fechahora.getMinutes(); 
    var segundo = fechahora.getSeconds(); 
    var meridiano = "am";
    if(hora == 0){
        hora = 12;
    }
    if(hora > 12) {
        hora = hora - 12;
        meridiano = "pm";
     }
    hora = (hora < 10) ? "0" + hora : hora;
    minuto = (minuto < 10) ? "0" + minuto : minuto;
    segundo = (segundo < 10) ? "0" + segundo : segundo;
    var tiempo = hora + ":" + minuto + ":" + segundo + " " + meridiano;    
    document.getElementById("relojnumerico").innerText = tiempo;
    document.getElementById("relojnumerico").textContent = tiempo;
    setTimeout(cargarReloj, 500);
 }
cargarReloj();
</script>

</body>
</html>
